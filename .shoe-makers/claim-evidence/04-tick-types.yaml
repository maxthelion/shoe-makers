# IMPORTANT: Evidence patterns are matched against source code with comments stripped.
# Both // line comments and /* */ block comments are removed before matching.
# Patterns must match text in actual code, not in comments or JSDoc.

# === tick-types.md ===
tick-types.assess-writes-assessment:
  source:
    - [writeAssessment]
  test:
    - [assessment]

tick-types.explore-writes-assessment:
  source:
    - [writeAssessment]
    - [assess]
  test:
    - [assessment]

tick-types.tree-conditions-drive-actions:
  source:
    - [testsFailing]
    - [hasWorkItem, hasCandidates]
  test:
    - [fix-tests]
    - [execute-work-item, prioritise]

tick-types.assess-gathers-invariants:
  source:
    - [checkInvariants]
  test:
    - [invariants]

tick-types.assess-gathers-test-results:
  source:
    - [runTests, testsPass]
  test:
    - [testsPass]

tick-types.assess-gathers-git-activity:
  source:
    - [getRecentGitActivity, recentGitActivity]
  test:
    - [recentGitActivity, gitActivity]

tick-types.assess-gathers-plans:
  source:
    - [findOpenPlans, openPlans]
  test:
    - [openPlans, plans]
