# IMPORTANT: Evidence patterns are matched against source code with comments stripped.
# Both // line comments and /* */ block comments are removed before matching.
# Patterns must match text in actual code, not in comments or JSDoc.

# === Section 2.6.1: Creative corpus ===

# Random concepts come from .shoe-makers/creative-corpus/ — markdown files with title, source URL, summary
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.random-concepts-for-the-creative-lens-come-from-shoemakerscr:
  source:
    - [creative-corpus]
    - [title]
    - [summary]
  test:
    - [creative-corpus]
    - [title]
    - [summary]

# Corpus populated by scripts/fetch-wikipedia-corpus.sh
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.the-corpus-is-populated-locally-by-running-scriptsfetchwikip:
  source:
    - [creative-corpus]
    - [fetchRandomArticle]
  test:
    - [creative-corpus]

# Setup picks one unused article at random from the corpus and embeds it in the innovate prompt
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.setup-picks-one-unused-article-at-random-from-the-corpus-and:
  source:
    - [pickFromCorpus]
    - [Math.random]
  test:
    - [pickFromCorpus]

# After innovate tick, article marked as used (used: true in frontmatter)
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.after-the-innovate-tick-completes-the-article-is-marked-as-u:
  source:
    - [markArticleUsed]
    - ["used: true"]
  test:
    - [markArticleUsed]
    - ["used: true"]

# When all articles used or corpus empty, human should run fetch script
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.when-all-articles-are-used-or-the-corpus-is-empty-the-human-:
  source:
    - [articles.length === 0]
  test:
    - [pickFromCorpus]
    - [toBeNull]

# Articles kept concise to minimise token usage
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.articles-should-be-kept-concise-to-minimise-token-usage-the-:
  source:
    - [substring(0, 1000)]
  test:
    - [truncates summary]

# Setup logs which article was selected (title) to the shift log
spec.creative-exploration-dedicated-innovate-and-evaluate-insight-actions.the-setup-script-logs-which-article-was-selected-title-to-th:
  source:
    - [Wikipedia article fetched]
    - [appendToShiftLog]
  test:
    - [Wikipedia article fetched]
