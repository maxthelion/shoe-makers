# IMPORTANT: Evidence patterns are matched against source code with comments stripped.
# Both // line comments and /* */ block comments are removed before matching.
# Patterns must match text in actual code, not in comments or JSDoc.

# === branching-strategy.md ===
branching-strategy.one-branch-per-shift:
  source:
    - [branchPrefix]
  test:
    - [branchPrefix, "shoemakers/"]

branching-strategy.branch-is-state:
  source:
    - [getCurrentBranch]
    - [hasUncommittedChanges]
  test:
    - [getCurrentBranch, hasUncommittedChanges]
