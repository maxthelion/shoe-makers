# IMPORTANT: Evidence patterns are matched against source code with comments stripped.
# Both // line comments and /* */ block comments are removed before matching.
# Patterns must match text in actual code, not in comments or JSDoc.

# === Section 2.3: Three-phase orchestration — innovate & evaluate-insight ===

# Innovate fires at innovation tier instead of explore
spec.three-phase-orchestration-bottom-of-tree.innovate-fires-at-innovation-tier-tier-3-instead-of-explore-:
  source:
    - [innovationTier, innovate]
    - [isInnovationTier]
  test:
    - [innovate when nothing else matches]

# Evaluate-insight fires when insight files exist
spec.three-phase-orchestration-bottom-of-tree.evaluateinsight-fires-when-insight-files-exist-generous-eval:
  source:
    - [hasInsights, evaluate-insight]
  test:
    - [evaluate-insight when insights exist]
